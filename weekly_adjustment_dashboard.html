<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Grade &middot; Weekly Adjustment Reports</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #1a1a18;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Home / cross-dashboard nav */
    .home-bar {
      background: #111110;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #2e2e2b;
    }
    .home-bar a {
      background: transparent;
      border: 1px solid #3b3b38;
      color: #a0a09a;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, color .15s, border-color .15s;
    }
    .home-bar a:hover,
    .home-bar a:focus-visible { background: #3b6d11; border-color: #3b6d11; color: #fff; outline: none; }
    .home-bar .sep { color: #3b3b38; font-size: 11px; }

    /* Week selector bar */
    .topbar {
      background: #1a1a18;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-bottom: 2px solid #3b6d11;
    }
    .topbar .title { color: #f5f5f3; font-size: 13px; font-weight: 700; white-space: nowrap; }
    .topbar select {
      background: #2e2e2b;
      color: #f5f5f3;
      border: 1px solid #5c5c58;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .topbar select:focus-visible { outline: 2px solid #3b6d11; outline-offset: 1px; }
    .topbar .badge {
      background: #3b6d11;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .topbar .hint { color: #73726c; font-size: 11px; margin-left: auto; }

    /* Report frame */
    .frame-wrap { flex: 1 1 auto; position: relative; min-height: 0; }
    #reportFrame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #f5f5f3;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #73726c;
      font-size: 13px;
      background: #1a1a18;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
    }
    #loading.on { opacity: 1; }

    @media (max-width: 600px) {
      .topbar .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="home-bar">
    <a href="index.html">&#127968; Home</a>
    <span class="sep">&middot;</span>
    <a href="cycle_count_dashboard_v6.html">&#x1F504; Cycle Count</a>
    <span class="sep">&middot;</span>
    <a href="PG_Live_Dashboard.html">&#128202; Total Adjustments</a>
  </div>

  <div class="topbar">
    <span class="title">&#128202; Pro Grade &middot; Inventory Adjustment Reports</span>
    <select id="weekSelect" aria-label="Select week">
      <option value="29" selected>Week 29 &middot; Current</option>
      <option value="28">Week 28</option>
      <option value="27">Week 27</option>
    </select>
    <span class="badge" id="badge">Week 29 &middot; Current</span>
    <span class="hint">Weeks 27&ndash;29 &middot; Updated weekly</span>
  </div>

  <div class="frame-wrap">
    <iframe id="reportFrame" src="week_29_report.html" title="Weekly Adjustment Report"></iframe>
    <div id="loading">Loading report&hellip;</div>
  </div>

  <script>
    (function () {
      var frame  = document.getElementById('reportFrame');
      var badge  = document.getElementById('badge');
      var sel    = document.getElementById('weekSelect');
      var load   = document.getElementById('loading');

      var labels = { 29: 'Week 29 \u00b7 Current', 28: 'Week 28', 27: 'Week 27' };

      frame.addEventListener('load', function () { load.classList.remove('on'); });

      sel.addEventListener('change', function () {
        var wk = this.value;
        load.classList.add('on');
        frame.src = 'week_' + wk + '_report.html';
        badge.textContent = labels[wk] || 'Week ' + wk;
      });
    })();
  </script>
</body>
</html>
